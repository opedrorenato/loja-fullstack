services:
  # ============================================================
  # Banco de Dados — SQL Server
  # ============================================================
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: loja-db-container
    environment:
      SA_PASSWORD: "SenhaForte!123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - loja-network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SenhaForte!123", "-Q", "SELECT 1", "-No" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # Backend — ASP.NET Core
  # ============================================================
  backend:
    build:
      context: ./backend/LojaFullStack.API
      dockerfile: Dockerfile
    container_name: loja-backend-container
    environment:
      ConnectionStrings__DefaultConnection: "Server=database,1433;Database=LojaDB;User Id=sa;Password=SenhaForte!123;TrustServerCertificate=True;"
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - loja-network
  # ============================================================
  # Frontend — React (TO-DO)
  # ============================================================

volumes:
  sqlserver_data:
    driver: local

networks:
  loja-network:
    driver: bridge
